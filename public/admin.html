<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramSetu Admin — Review Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <span class="brand-icon">🛡️</span>
            <h1>GramSetu <span class="brand-sub">Admin</span></h1>
        </div>
        <div class="header-stats" id="headerStats">
            <div class="stat-chip pending"><span id="statPending">0</span> Pending</div>
            <div class="stat-chip approved"><span id="statApproved">0</span> Approved</div>
            <div class="stat-chip rejected"><span id="statRejected">0</span> Rejected</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="pending" onclick="switchTab('pending')">
                ⏳ Pending Review
                <span class="tab-badge" id="pendingBadge">0</span>
            </button>
            <button class="tab" data-tab="history" onclick="switchTab('history')">
                📋 History
            </button>
            <button class="tab" data-tab="test" onclick="switchTab('test')">
                💬 Test Chat
            </button>
        </div>

        <!-- Pending Reviews Tab -->
        <div class="tab-content active" id="tab-pending">
            <div id="pendingList" class="review-list">
                <div class="empty-state">
                    <span class="empty-icon">📭</span>
                    <p>No pending reviews</p>
                    <small>Applications will appear here when users submit forms</small>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div class="tab-content" id="tab-history">
            <div id="historyList" class="review-list">
                <div class="empty-state">
                    <span class="empty-icon">📋</span>
                    <p>No review history yet</p>
                </div>
            </div>
        </div>

        <!-- Test Chat Tab -->
        <div class="tab-content" id="tab-test">
            <div class="chat-container">
                <div class="chat-header">
                    <span>💬</span> Test Chat (simulates WhatsApp)
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-msg bot">
                        <div class="msg-bubble">
                            Type a message below to simulate a WhatsApp conversation. Try saying
                            <strong>"namaste"</strong> or <strong>"hello"</strong>!
                        </div>
                    </div>
                </div>
                <form class="chat-input" onsubmit="sendChat(event)">
                    <input type="text" id="chatInput" placeholder="Type a message... (try 'namaste')"
                        autocomplete="off">
                    <button type="submit">Send ▶</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">Review Application</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <textarea id="reviewNotes" placeholder="Admin notes (optional)..."></textarea>
                <div class="modal-actions">
                    <button class="btn btn-reject" onclick="rejectReview()">❌ Reject</button>
                    <button class="btn btn-approve" onclick="approveReview()">✅ Approve & Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
