# ============================================================
# GramSetu Nginx Configuration (Reverse Proxy)
# ============================================================
# This configures Nginx to:
# 1. Handle SSL (HTTPS)
# 2. Forward API requests to the Docker Backend (FastAPI)
# 3. Support WebSockets (Realtime STT + Browser Preview)
# 4. Handle large file uploads (for voice notes)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP; # Replace with your VPS IP or Domain

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_OR_IP;

    # SSL Certificates (Managed via Certbot/Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Optimization
    client_max_body_size 50M;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # ── Backend API ──────────────────────────────────────────
    location / {
        proxy_pass http://backend:8000; # Points to the FastAPI/Docker container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSockets (CRITICAL for Voice + Live Browser) ───────
    # This handles endpoints like /ws/browser/ and /api/voice/realtime
    location ~* /(ws|realtime) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for long-running browser fill sessions
        proxy_read_timeout 86400;
    }

    # ── Static Mock Portals (Optional) ──────────────────────
    # If you want Nginx to serve them directly for speed
    # location /mock {
    #     alias /app/backend/static/mock_portals;
    # }
}
