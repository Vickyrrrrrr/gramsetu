name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest ruff

      - name: Ruff autofix safe issues in backend
        run: |
          ruff check backend --config ruff.toml --fix || true

      - name: Ruff lint backend only
        run: |
          ruff check backend --config ruff.toml

      - name: Compile Python
        run: |
          [ -d backend ] && python -m compileall backend

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          if [ -d tests ] || [ -d backend/tests ]; then
            python -m pytest tests/ -q --tb=short
          else
            echo "No tests present, skipping pytest"
          fi

  container-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: gramsetu-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare CI env files
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            cp .env.example .env.ci
          else
            touch .env .env.ci
          fi

      - name: Validate Compose structure
        run: |
          GRAFANA_ADMIN_USER=admin GRAFANA_ADMIN_PASSWORD=admin docker compose --env-file .env.ci config --quiet

      - name: Check Compose files exist
        run: |
          test -f deploy/prometheus/prometheus.yml
          test -d deploy/grafana/provisioning
