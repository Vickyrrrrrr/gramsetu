name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/Gramsetu
            git fetch origin main
            git reset --hard origin/main
            docker stop gramsetu-backend 2>/dev/null || true
            docker rm gramsetu-backend 2>/dev/null || true
            docker build -t gramsetu_backend:latest .
            docker run -d --name gramsetu-backend --restart unless-stopped -p 8000:8000 --env-file .env gramsetu_backend:latest
            sleep 12
            docker logs gramsetu-backend --tail 10
