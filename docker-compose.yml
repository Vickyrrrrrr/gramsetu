services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gramsetu-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=https://integrate.api.nvidia.com/v1
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - PORT=8000
      - WHATSAPP_GATEWAY_URL=http://whatsapp-gateway:3001
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      retries: 3

  whatsapp-gateway:
    build:
      context: ./whatsapp-gateway
      dockerfile: Dockerfile
    container_name: gramsetu-whatsapp
    ports:
      - "3001:3001"
    environment:
      - GRAMSETU_URL=http://backend:8000
      - LOG_LEVEL=info
    volumes:
      - ./whatsapp-gateway/auth_info:/app/auth_info
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 60s
      retries: 3
